<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔵 Equipo Azul — Capybara</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:linear-gradient(160deg,#0d2a6b,#1a3a8f,#0a1a4a);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  font-family:'Nunito',sans-serif;color:white;padding:10px;
  user-select:none;
}
#status{
  font-family:'Fredoka One',cursive;font-size:.9rem;
  padding:5px 18px;border-radius:50px;margin-bottom:8px;
  background:rgba(0,0,0,.3);border:2px solid #4477cc;
}
#status.on{border-color:#44ee44;color:#88ff88;}
#team-title{
  font-family:'Fredoka One',cursive;font-size:1.8rem;color:#64b5f6;
  text-shadow:0 0 20px rgba(100,180,255,.5);margin-bottom:4px;
}
#scores{display:flex;gap:16px;margin-bottom:8px;}
.sc{background:rgba(0,0,0,.3);border-radius:12px;padding:4px 14px;text-align:center;font-size:.75rem;color:#aaa;}
.sc span{display:block;font-family:'Fredoka One',cursive;font-size:1.4rem;color:white;}
#qbox{
  background:rgba(0,0,0,.4);border:2px solid rgba(100,150,255,.3);
  border-radius:16px;padding:10px 20px;text-align:center;
  width:100%;max-width:340px;margin-bottom:8px;
}
#qlabel{font-size:.7rem;color:#88aaff;letter-spacing:2px;margin-bottom:2px;}
#qtext{font-family:'Fredoka One',cursive;font-size:1.6rem;color:white;min-height:40px;}
#timer-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
#tbar-wrap{flex:1;height:8px;background:rgba(255,255,255,.15);border-radius:4px;}
#tbar{height:100%;background:#44ee44;border-radius:4px;transition:width .9s linear,background .3s;}
#tnum{font-family:'Fredoka One',cursive;font-size:1rem;color:white;min-width:26px;text-align:right;}
#ans-box{
  background:rgba(0,0,0,.5);border:3px solid #4477cc;border-radius:16px;
  padding:10px 20px;text-align:center;width:100%;max-width:340px;margin-bottom:8px;
}
#ans-label{font-size:.7rem;color:#88aaff;letter-spacing:2px;}
#ans-val{font-family:'Fredoka One',cursive;font-size:2.8rem;color:#64b5f6;min-height:52px;}
#fb{
  font-family:'Fredoka One',cursive;font-size:1.1rem;
  min-height:30px;text-align:center;margin-bottom:6px;
  padding:4px 12px;border-radius:10px;
}
#fb.ok{background:rgba(50,200,50,.25);color:#88ff88;}
#fb.w{background:rgba(200,50,50,.25);color:#ff7766;}
.numpad{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  width:100%;max-width:340px;
}
.nb{
  padding:18px 0;border:none;border-radius:16px;
  font-family:'Fredoka One',cursive;font-size:1.6rem;
  color:white;cursor:pointer;transition:all .12s;
  background:rgba(40,80,200,.55);border:2px solid rgba(80,120,255,.4);
}
.nb:active{transform:scale(.9);background:rgba(40,80,200,.9);}
.del{background:rgba(100,60,180,.55)!important;font-size:1.3rem;}
.ok-btn{
  grid-column:span 2;background:rgba(30,160,60,.8)!important;
  font-size:1.3rem;border:2px solid rgba(60,220,80,.5)!important;
}
.zero{grid-column:span 1;}

#pause-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:100;
}
#pause-overlay.show{display:flex;}
#pause-overlay .pe{font-size:3rem;}
#pause-overlay .pt{font-family:'Fredoka One',cursive;font-size:1.8rem;color:white;}
#pause-overlay .ps{color:#aaa;text-align:center;padding:0 20px;}
</style>
</head>
<body>

<div id="status">🔄 Conectando...</div>
<div id="team-title">🔵 Equipo Azul</div>

<div id="scores">
  <div class="sc">Azul 🔵<span id="sb">0</span></div>
  <div class="sc">Rojo 🔴<span id="sr">0</span></div>
</div>

<div id="qbox">
  <div id="qlabel">¿CUÁNTO ES?</div>
  <div id="qtext">Esperando...</div>
</div>

<div id="timer-row">
  <div id="tbar-wrap"><div id="tbar" style="width:100%"></div></div>
  <div id="tnum">30</div>
</div>

<div id="ans-box">
  <div id="ans-label">TU RESPUESTA</div>
  <div id="ans-val">?</div>
</div>

<div id="fb"> </div>

<div class="numpad">
  <button class="nb" ontouchstart="np('1')" onclick="np('1')">1</button>
  <button class="nb" ontouchstart="np('2')" onclick="np('2')">2</button>
  <button class="nb" ontouchstart="np('3')" onclick="np('3')">3</button>
  <button class="nb" ontouchstart="np('4')" onclick="np('4')">4</button>
  <button class="nb" ontouchstart="np('5')" onclick="np('5')">5</button>
  <button class="nb" ontouchstart="np('6')" onclick="np('6')">6</button>
  <button class="nb" ontouchstart="np('7')" onclick="np('7')">7</button>
  <button class="nb" ontouchstart="np('8')" onclick="np('8')">8</button>
  <button class="nb" ontouchstart="np('9')" onclick="np('9')">9</button>
  <button class="nb zero" ontouchstart="np('0')" onclick="np('0')">0</button>
  <button class="nb del" ontouchstart="del()" onclick="del()">⌫</button>
  <button class="nb ok-btn" ontouchstart="submitAns()" onclick="submitAns()">✓ OK</button>
</div>

<div id="pause-overlay">
  <div class="pe">⏸</div>
  <div class="pt">Juego Pausado</div>
  <div class="ps" id="pause-sub">El profesor pausó el juego</div>
</div>

<script>
const TEAM='b', TS=30;
let ws, buf='', pingInterval=null;

function connectWS(){
  const proto=location.protocol==='https:'?'wss://':'ws://';
  ws=new WebSocket(proto+location.host);
  ws.onopen=()=>{
    ws.send(JSON.stringify({type:'register',role:'blue'}));
    setStatus('✅ Conectado',true);
    clearInterval(pingInterval);
    pingInterval=setInterval(()=>{ if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'ping'})); },20000);
  };
  ws.onmessage=e=>{ try{ handle(JSON.parse(e.data)); }catch(err){} };
  ws.onerror=()=>ws.close();
  ws.onclose=()=>{
    clearInterval(pingInterval);
    setStatus('🔄 Reconectando...',false);
    setTimeout(connectWS,1500);
  };
}
document.addEventListener('visibilitychange',()=>{ if(!document.hidden&&(!ws||ws.readyState!==1)) connectWS(); });
function send(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }
function setStatus(txt,on){
  const s=document.getElementById('status');
  s.textContent=txt; s.className=on?'on':'';
}

function handle(msg){
  switch(msg.type){
    case 'state':
      document.getElementById('qtext').textContent=msg.qtext;
      document.getElementById('sb').textContent=msg.sb;
      document.getElementById('sr').textContent=msg.sr;
      buf=msg.ib||''; document.getElementById('ans-val').textContent=buf||'?';
      updateTimer(msg.timer); break;
    case 'pause':
      document.getElementById('pause-overlay').classList.toggle('show',msg.paused); break;
    case 'hostLeft':
      document.getElementById('pause-overlay').classList.add('show');
      document.getElementById('pause-sub').textContent='El profesor cerró el juego'; break;
    case 'timer': updateTimer(msg.value); break;
    case 'nextQ':
      document.getElementById('qtext').textContent=msg.qtext;
      buf=''; document.getElementById('ans-val').textContent='?';
      clrFb(); break;
    case 'correct':
      document.getElementById('sb').textContent=msg.sb;
      document.getElementById('sr').textContent=msg.sr;
      if(msg.team===TEAM){ setFb('✅ ¡Correcto! +10','ok'); buf=''; document.getElementById('ans-val').textContent='?'; setTimeout(clrFb,800); }
      break;
    case 'wrong':
      if(msg.team===TEAM){ setFb('❌ Incorrecto','w'); buf=''; document.getElementById('ans-val').textContent='?'; setTimeout(clrFb,1200); }
      break;
    case 'bothWrong': setFb('💀 Los dos fallaron','w'); setTimeout(clrFb,1200); break;
    case 'timeout': setFb('⏱ Tiempo!',''); buf=''; document.getElementById('ans-val').textContent='?'; setTimeout(clrFb,900); break;
    case 'win':
      document.getElementById('qtext').textContent=msg.team===TEAM?'🏆 ¡Ganaron!':'😔 Perdieron';
      setFb(msg.team===TEAM?'🎉 ¡VICTORIA!':'💪 ¡La próxima!', msg.team===TEAM?'ok':'w'); break;
    case 'restart':
      document.getElementById('qtext').textContent=msg.qtext||'Esperando...';
      buf=''; document.getElementById('ans-val').textContent='?';
      document.getElementById('sb').textContent='0';
      document.getElementById('sr').textContent='0';
      clrFb(); break;
  }
}

function updateTimer(v){
  document.getElementById('tnum').textContent=v;
  const pct=v/TS*100;
  const tb=document.getElementById('tbar');
  tb.style.width=pct+'%';
  tb.style.background=v>15?'#44ee44':v>8?'#ffcc44':'#ff5555';
}
function setFb(txt,cls){ const e=document.getElementById('fb'); e.textContent=txt; e.className=cls; }
function clrFb(){ const e=document.getElementById('fb'); e.textContent=' '; e.className=''; }

let lastNp=0;
function np(d){
  const now=Date.now(); if(now-lastNp<80)return; lastNp=now;
  if(buf.length>=3)return;
  buf+=d; document.getElementById('ans-val').textContent=buf;
  send({type:'input',team:TEAM,digit:d});
}
function del(){
  if(!buf)return;
  buf=buf.slice(0,-1);
  document.getElementById('ans-val').textContent=buf||'?';
  send({type:'delete',team:TEAM});
}
function submitAns(){
  if(!buf)return;
  send({type:'submit',team:TEAM});
}

window.addEventListener('load',connectWS);
</script>
</body>
</html>
